[package]
name = "agentic-sdk"
version = "0.1.0"
edition = "2021"
description = "Wireframe AI SDK — envelope, message types, Module trait, NATS helpers"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = "0.9"
uuid = { workspace = true }
chrono = { version = "0.4", features = ["serde"] }
thiserror = { workspace = true }
anyhow = { workspace = true }
tokio = { workspace = true, features = ["sync", "macros", "rt-multi-thread", "signal"] }
async-nats = { workspace = true }
tracing = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }
bytes = { workspace = true }
sha2 = { workspace = true }
jsonschema = { version = "0.18", optional = true }
notify = "6.1"
dashmap = { workspace = true }

agentic-sdk-macros = { version = "0.1.0", path = "../agentic-sdk-macros", optional = true }

[features]
macros = ["agentic-sdk-macros"]
schema-validation = ["jsonschema"]

[lib]
name = "agentic_sdk"
path = "src/lib.rs"

[[example]]
name = "benchmark_serialize"
path = "examples/benchmark_serialize.rs"
