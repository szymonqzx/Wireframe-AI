global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'nats'
    static_configs:
      - targets: ['nats:8222']
    metrics_path: /varz

  - job_name: 'wireframe-modules'
    static_configs:
      - targets:
        - 'wireframe-context:8080'
        - 'wireframe-orchestrator:8080'
        - 'wireframe-sandbox:8080'
        - 'wireframe-observability:8080'
    metrics_path: /metrics
