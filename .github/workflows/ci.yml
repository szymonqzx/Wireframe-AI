name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      nats:
        image: nats:alpine
        ports:
          - 4222:4222
        options: >-
          --health-cmd "/nats-server -V"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --features schema-validation -- -D warnings

      - name: Build
        run: cargo build --release --features schema-validation

      - name: Run unit tests
        run: cargo test --lib --features schema-validation

      - name: Run integration tests (with NATS)
        run: cargo test --test integration_test --features schema-validation
        env:
          RUST_LOG: debug

  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python SDK
        run: |
          pip install sdk/agentic-sdk-py[dev]
          pip install adapter/python
      - name: Check imports
        run: python -c "from agentic_sdk import Envelope, Module; print('Python SDK OK')"
      - name: Run Python tests
        run: python -m pytest tests/python/test_python_sdk.py -v
