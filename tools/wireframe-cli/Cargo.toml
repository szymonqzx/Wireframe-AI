[package]
name = "wireframe-cli"
version = "0.1.0"
edition = "2021"
description = "Wireframe AI CLI — module scaffolding and development tools"

[[bin]]
name = "wireframe"
path = "src/main.rs"

[dependencies]
clap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
anyhow = { workspace = true }
chrono = { workspace = true }
sysinfo = { workspace = true }
regex = "1"
syn = { version = "2", features = ["full", "parsing"] }
